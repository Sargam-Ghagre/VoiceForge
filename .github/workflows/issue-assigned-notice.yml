name: Issue Assigned Notice

on:
  issues:
    types: [assigned]

permissions:
  issues: write

concurrency:
  group: issue-assigned-notice-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  notify:
    if: github.event.issue.pull_request == null && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Notify assigned contributor
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const assignee = context.payload.assignee;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = issue.number;

            if (!assignee || assignee.type === 'Bot') return;
            if ((issue.labels || []).some(label => label.name.toLowerCase() === 'go ahead')) return;

            const marker = `<!-- voiceforge-issue-assigned-${assignee.login} -->`;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100
            });
            const existing = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body &&
              comment.body.includes(marker)
            );

            const body =
              `${marker}\n` +
              `## Assignment Recorded\n\n` +
              `Hi @${assignee.login}, this issue has been assigned to you by the maintainer team.\n\n` +
              `Thanks for stepping up to help. Please wait for a mentor to mark the issue with \`go ahead\` before starting implementation.\n\n` +
              `### Before You Start\n\n` +
              `| Step | Guidance |\n` +
              `| --- | --- |\n` +
              `| Assignment | Recorded for @${assignee.login} |\n` +
              `| Start signal | Wait for the \`go ahead\` label and mentor guidance comment |\n` +
              `| Scope | Read the issue description and maintainer comments carefully |\n` +
              `| PR later | Use the matching program PR template and include \`Closes #${issue_number}\` |\n\n` +
              `If you cannot continue, leave a quick comment here so maintainers can reopen the issue for another contributor.\n\n` +
              `VoiceForge automation`;

            try {
              if (existing) {
                if (existing.body.trim() === body.trim()) return;
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                  body
                });
              } else {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number,
                  body
                });
              }
            } catch (error) {
              if (error.status === 403) {
                core.warning(`Could not write assignment notice: ${error.message}`);
                return;
              }
              throw error;
            }
